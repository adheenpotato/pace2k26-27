<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2k26-27</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.calendar-container {
    width: 90%;
    max-width: 900px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

button {
    background: #ffcc00;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.08);
}

.month-title {
    font-size: 24px;
    font-weight: bold;
}

.weekdays, .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
}

.weekdays div {
    font-weight: bold;
    padding: 10px;
    color: #ffdd57;
}

/* =========================
   DAY CARD + HOVER ANIMATION
========================= */
.day {
    background: rgba(255,255,255,0.08);
    margin: 3px;
    border-radius: 12px;
    min-height: 80px;
    padding: 6px;
    cursor: pointer;
    position: relative;
    transition: all 0.25s ease;
    transform: translateY(0);
}

/* hover pop + glow */
.day:hover {
    transform: translateY(-6px) scale(1.03);
    background: rgba(255,255,255,0.18);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* date number */
.date-number {
    font-size: 14px;
    opacity: 0.8;
}

/* event label (NOT sticky note style) */
.event {
    margin-top: 5px;
    font-size: 12px;
    background: linear-gradient(90deg, #ff6b6b, #ff8e53);
    padding: 3px 6px;
    border-radius: 6px;
    display: inline-block;
}

/* =========================
   TODAY ANIMATION
========================= */
.today {
    border: 2px solid #00ffea;
    box-shadow: 0 0 15px rgba(0,255,234,0.6);
    animation: pulseToday 1.6s infinite ease-in-out;
}

@keyframes pulseToday {
    0% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(0,255,234,0.4);
    }
    50% {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(0,255,234,0.9);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(0,255,234,0.4);
    }
}

.disabled {
    opacity: 0.3;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="calendar-container">
    <div class="header">
        <button id="prevBtn">◀</button>
        <div class="month-title" id="monthTitle"></div>
        <button id="nextBtn">▶</button>
    </div>

    <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="days" id="days"></div>
</div>

<script>
const daysContainer = document.getElementById("days");
const monthTitle = document.getElementById("monthTitle");

let current = new Date(2026, 5, 1);

const minDate = new Date(2026, 5, 1);
const maxDate = new Date(2027, 2, 31);

const today = new Date();
today.setHours(0,0,0,0);

function formatKey(date) {
    return date.toISOString().split("T")[0];
}

function loadEvents() {
    return JSON.parse(localStorage.getItem("events") || "{}");
}

function saveEvents(events) {
    localStorage.setItem("events", JSON.stringify(events));
}

function renderCalendar() {
    daysContainer.innerHTML = "";

    const year = current.getFullYear();
    const month = current.getMonth();

    const events = loadEvents();

    monthTitle.textContent = current.toLocaleString("default", {
        month: "long",
        year: "numeric"
    });

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        daysContainer.appendChild(document.createElement("div"));
    }

    for (let d = 1; d <= lastDate; d++) {
        const date = new Date(year, month, d);
        const key = formatKey(date);

        const cell = document.createElement("div");
        cell.className = "day";

        // TODAY HIGHLIGHT
        const isToday =
            date.getFullYear() === today.getFullYear() &&
            date.getMonth() === today.getMonth() &&
            date.getDate() === today.getDate();

        if (isToday) {
            cell.classList.add("today");
        }

        const num = document.createElement("div");
        num.className = "date-number";
        num.textContent = d;

        cell.appendChild(num);

        if (events[key]) {
            const ev = document.createElement("div");
            ev.className = "event";
            ev.textContent = events[key];
            cell.appendChild(ev);
        }

        cell.addEventListener("click", () => {
            const currentEvents = loadEvents();
            const existing = currentEvents[key] || "";

            const input = prompt("Enter event for " + key, existing);

            if (input === null) return;

            if (input.trim() === "") {
                delete currentEvents[key];
            } else {
                currentEvents[key] = input.trim();
            }

            saveEvents(currentEvents);
            renderCalendar();
        });

        daysContainer.appendChild(cell);
    }

    updateButtons();
}

function updateButtons() {
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    prevBtn.disabled = current <= minDate;
    nextBtn.disabled = current >= maxDate;

    prevBtn.classList.toggle("disabled", prevBtn.disabled);
    nextBtn.classList.toggle("disabled", nextBtn.disabled);
}

document.getElementById("prevBtn").addEventListener("click", () => {
    if (current <= minDate) return;
    current.setMonth(current.getMonth() - 1);
    renderCalendar();
});

document.getElementById("nextBtn").addEventListener("click", () => {
    if (current >= maxDate) return;
    current.setMonth(current.getMonth() + 1);
    renderCalendar();
});

renderCalendar();
</script>

</body>
</html>
